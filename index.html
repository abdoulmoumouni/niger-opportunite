<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Android App</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header, footer {
    background: #333;
    color: white;
    padding: 1em 0;
    text-align: center;
  }
  .content {
    flex: 1;
    padding: 2em;
    text-align: center;
  }
  .app-title {
    font-size: 2em;
  }
  .app-description {
    margin: 1em 0;
  }
  .download-button {
    background: #008CBA;
    border: none;
    padding: 1em 2em;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 4px 2px;
    cursor: pointer;
    color: white;
  }
</style>
</head>
<body>
<header>
  <h1 class="app-title">Your App Name</h1>
</header>

<div class="content">
  <p class="app-description">
    Describe your app here. Highlight features, benefits, and anything that makes your app stand out.
  </p>
  <a href="https://play.google.com/store/apps/details?id=your.app.id" class="download-button">Download on the Play Store</a>
</div>

<footer>
  <p>&copy; 2024 Your Company Name. All Rights Reserved.</p>
</footer>

<script>
  // JavaScript can go here if needed
</script>
</body>
</html>
